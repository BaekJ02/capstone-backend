<!DOCTYPE html>
<html>
<head>
    <title>주식 실시간 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .search-box { margin-bottom: 20px; }
        .search-results { border: 1px solid #ddd; max-height: 200px; overflow-y: auto; width: 300px; }
        .search-item { padding: 8px; cursor: pointer; }
        .search-item:hover { background-color: #f0f0f0; }
        .stock-card { border: 1px solid #ddd; padding: 15px; margin: 10px 0; width: 300px; }
    </style>
</head>
<body>
<h2>실시간 주가 테스트</h2>

<!-- 국내 주식 검색 -->
<div class="search-box">
    <h3>🇰🇷 국내 주식</h3>
    <input id="domesticKeyword" placeholder="종목명 검색 (예: 삼성)" oninput="searchDomestic()" />
    <div class="search-results" id="domesticSearchResults"></div>
    <div class="stock-card" id="domesticResult">종목을 선택해주세요</div>
</div>

<!-- 미국 주식 검색 -->
<div class="search-box">
    <h3>🇺🇸 미국 주식</h3>
    <input id="overseasSymbol" placeholder="종목코드 직접 입력 (예: AAPL)" />
    <select id="exchange">
        <option value="NAS">나스닥 (AAPL, TSLA 등)</option>
        <option value="NYS">뉴욕 (BRK 등)</option>
        <option value="AMS">아멕스 (VOO, SPY 등)</option>
    </select>
    <button onclick="subscribeOverseas()">구독</button>
    <button onclick="unsubscribeOverseas()">구독취소</button>
    <div class="stock-card" id="overseasResult">종목을 선택해주세요</div>
</div>

<script>
    const socket = new SockJS('http://localhost:8080/ws');
    const stompClient = Stomp.over(socket);
    const subscriptions = {};

    stompClient.connect({}, function () {
        console.log('WebSocket 연결 성공!');
    });

    // 국내 주식 검색
    function searchDomestic() {
        const keyword = document.getElementById('domesticKeyword').value;
        if (keyword.length < 1) {
            document.getElementById('domesticSearchResults').innerHTML = '';
            return;
        }

        fetch(`http://localhost:8080/api/stocks/search?keyword=${keyword}`)
            .then(res => res.json())
            .then(data => {
                const resultsDiv = document.getElementById('domesticSearchResults');
                resultsDiv.innerHTML = '';
                data.forEach(stock => {
                    const item = document.createElement('div');
                    item.className = 'search-item';
                    item.innerHTML = `${stock.name} (${stock.symbol}) - ${stock.market}`;
                    item.onclick = () => selectDomesticStock(stock.symbol, stock.name);
                    resultsDiv.appendChild(item);
                });
            });
    }

    // 국내 주식 선택
    function selectDomesticStock(symbol, name) {
        document.getElementById('domesticKeyword').value = name;
        document.getElementById('domesticSearchResults').innerHTML = '';

        // 기존 구독 끊기
        if (subscriptions['domestic']) {
            subscriptions['domestic'].unsubscribe();
        }

        stompClient.send("/app/subscribe/domestic", {}, symbol);
        subscriptions['domestic'] = stompClient.subscribe('/topic/domestic/' + symbol, function (message) {
            const data = JSON.parse(message.body);
            document.getElementById('domesticResult').innerHTML =
                `<b>${name} (${data.symbol})</b><br>
                    현재가: ${Number(data.price).toLocaleString()}원<br>
                    전일대비: ${data.change} (${data.changePercent}%)`;
        });
    }

    // 미국 주식 구독
    function subscribeOverseas() {
        const symbol = document.getElementById('overseasSymbol').value;
        const exchange = document.getElementById('exchange').value;

        if (subscriptions['overseas']) {
            subscriptions['overseas'].unsubscribe();
        }

        stompClient.send("/app/subscribe/overseas", {}, symbol + "," + exchange);
        subscriptions['overseas'] = stompClient.subscribe('/topic/overseas/' + symbol, function (message) {
            const data = JSON.parse(message.body);
            document.getElementById('overseasResult').innerHTML =
                `<b>${data.symbol}</b><br>
                    현재가: $${data.price}<br>
                    전일대비: ${data.change} (${data.changePercent}%)`;
        });
    }

    // 미국 주식 구독취소
    function unsubscribeOverseas() {
        const symbol = document.getElementById('overseasSymbol').value;
        stompClient.send("/app/unsubscribe/overseas", {}, symbol);
        if (subscriptions['overseas']) {
            subscriptions['overseas'].unsubscribe();
            delete subscriptions['overseas'];
        }
        document.getElementById('overseasResult').innerHTML = '종목을 선택해주세요';
    }
</script>
</body>
</html>
