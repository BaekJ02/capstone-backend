<!DOCTYPE html>
<html>
<head>
    <title>주식 실시간 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .section { margin-bottom: 30px; border: 1px solid #ddd; padding: 15px; border-radius: 8px; }
        .search-results { border: 1px solid #ddd; max-height: 200px; overflow-y: auto; width: 350px; }
        .search-item { padding: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .search-item:hover { background-color: #f0f0f0; }
        .market-badge { font-size: 11px; padding: 2px 6px; border-radius: 4px; color: white; }
        .KOSPI { background-color: #1976D2; }
        .KOSDAQ { background-color: #388E3C; }
        .ETF { background-color: #F57C00; }
        .NASDAQ { background-color: #7B1FA2; }
        .NYSE { background-color: #C62828; }
        .AMEX { background-color: #00838F; }
        .OTHER { background-color: #616161; }
        .stock-card { border: 1px solid #ddd; padding: 15px; margin-top: 10px; border-radius: 8px; min-height: 60px; }
        input { padding: 8px; width: 250px; margin-right: 5px; }
        select { padding: 8px; margin-right: 5px; }
        button { padding: 8px 12px; cursor: pointer; }
    </style>
</head>
<body>
<h2>📈 주식 실시간 테스트</h2>

<!-- 국내 주식 검색 -->
<div class="section">
    <h3>🇰🇷 국내 주식 / ETF</h3>
    <input id="domesticKeyword" placeholder="종목명 검색 (예: 삼성, KODEX)" oninput="searchDomestic()" />
    <button onclick="unsubscribeDomestic()">구독취소</button>
    <div class="search-results" id="domesticSearchResults"></div>
    <div class="stock-card" id="domesticResult">종목을 선택해주세요</div>
</div>

<!-- 미국 주식 검색 -->
<div class="section">
    <h3>🇺🇸 미국 주식</h3>
    <input id="overseasKeyword" placeholder="종목명/코드 검색 (예: Apple, AAPL)" oninput="searchOverseas()" />
    <button onclick="unsubscribeOverseas()">구독취소</button>
    <div class="search-results" id="overseasSearchResults"></div>
    <div class="stock-card" id="overseasResult">종목을 선택해주세요</div>
</div>

<script>
    const socket = new SockJS('http://localhost:8080/ws');
    const stompClient = Stomp.over(socket);
    const subscriptions = {};

    stompClient.connect({}, function () {
        console.log('WebSocket 연결 성공!');
    });

    // 거래소 코드 자동 매핑
    function getExchangeCode(market) {
        if (market === 'NASDAQ') return 'NAS';
        if (market === 'NYSE') return 'NYS';
        if (market === 'AMEX' || market === 'OTHER') return 'AMS';
        return 'NAS';
    }

    // 국내 주식 검색
    function searchDomestic() {
        const keyword = document.getElementById('domesticKeyword').value;
        if (keyword.length < 1) {
            document.getElementById('domesticSearchResults').innerHTML = '';
            return;
        }

        fetch(`http://localhost:8080/api/stocks/search?keyword=${keyword}`)
            .then(res => res.json())
            .then(data => {
                // 국내 주식/ETF만 필터링
                const filtered = data.filter(s =>
                    s.market === 'KOSPI' || s.market === 'KOSDAQ' || s.market === 'ETF'
                );
                const resultsDiv = document.getElementById('domesticSearchResults');
                resultsDiv.innerHTML = '';
                filtered.forEach(stock => {
                    const item = document.createElement('div');
                    item.className = 'search-item';
                    item.innerHTML = `
                        <span>${stock.name} (${stock.symbol})</span>
                        <span class="market-badge ${stock.market}">${stock.market}</span>
                    `;
                    item.onclick = () => selectDomesticStock(stock.symbol, stock.name);
                    resultsDiv.appendChild(item);
                });
            });
    }

    // 미국 주식 검색
    function searchOverseas() {
        const keyword = document.getElementById('overseasKeyword').value;
        if (keyword.length < 1) {
            document.getElementById('overseasSearchResults').innerHTML = '';
            return;
        }

        fetch(`http://localhost:8080/api/stocks/search?keyword=${keyword}`)
            .then(res => res.json())
            .then(data => {
                // 미국 주식만 필터링
                const filtered = data.filter(s =>
                    s.market === 'NASDAQ' || s.market === 'NYSE' ||
                    s.market === 'AMEX' || s.market === 'OTHER'
                );
                const resultsDiv = document.getElementById('overseasSearchResults');
                resultsDiv.innerHTML = '';
                filtered.forEach(stock => {
                    const item = document.createElement('div');
                    item.className = 'search-item';
                    item.innerHTML = `
                        <span>${stock.name} (${stock.symbol})</span>
                        <span class="market-badge ${stock.market}">${stock.market}</span>
                    `;
                    item.onclick = () => selectOverseasStock(stock.symbol, stock.name, stock.market);
                    resultsDiv.appendChild(item);
                });
            });
    }

    // 국내 주식 선택
    function selectDomesticStock(symbol, name) {
        document.getElementById('domesticKeyword').value = name;
        document.getElementById('domesticSearchResults').innerHTML = '';

        if (subscriptions['domestic']) {
            subscriptions['domestic'].unsubscribe();
        }

        stompClient.send("/app/subscribe/domestic", {}, symbol);
        subscriptions['domestic'] = stompClient.subscribe('/topic/domestic/' + symbol, function (message) {
            const data = JSON.parse(message.body);
            document.getElementById('domesticResult').innerHTML =
                `<b>${name} (${data.symbol})</b><br>
                현재가: ${Number(data.price).toLocaleString()}원<br>
                전일대비: ${data.change} (${data.changePercent}%)`;
        });
    }

    // 미국 주식 선택
    function selectOverseasStock(symbol, name, market) {
        document.getElementById('overseasKeyword').value = name;
        document.getElementById('overseasSearchResults').innerHTML = '';

        if (subscriptions['overseas']) {
            subscriptions['overseas'].unsubscribe();
        }

        const exchange = getExchangeCode(market);
        stompClient.send("/app/subscribe/overseas", {}, symbol + "," + exchange);
        subscriptions['overseas'] = stompClient.subscribe('/topic/overseas/' + symbol, function (message) {
            const data = JSON.parse(message.body);
            document.getElementById('overseasResult').innerHTML =
                `<b>${name} (${data.symbol})</b> <span class="market-badge ${market}">${market}</span><br>
                현재가: $${data.price}<br>
                전일대비: ${data.change} (${data.changePercent}%)`;
        });
    }

    // 구독 취소
    function unsubscribeDomestic() {
        if (subscriptions['domestic']) {
            subscriptions['domestic'].unsubscribe();
            delete subscriptions['domestic'];
        }
        document.getElementById('domesticKeyword').value = '';
        document.getElementById('domesticSearchResults').innerHTML = '';
        document.getElementById('domesticResult').innerHTML = '종목을 선택해주세요';
    }

    function unsubscribeOverseas() {
        if (subscriptions['overseas']) {
            subscriptions['overseas'].unsubscribe();
            delete subscriptions['overseas'];
        }
        document.getElementById('overseasKeyword').value = '';
        document.getElementById('overseasSearchResults').innerHTML = '';
        document.getElementById('overseasResult').innerHTML = '종목을 선택해주세요';
    }
</script>
</body>
</html>
