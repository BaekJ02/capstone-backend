<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>캡스톤 주식 테스트</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.5.0/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        h2 { color: #1a1a2e; margin-bottom: 16px; }
        h3 { color: #0f3460; margin-bottom: 10px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        input, select { padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; width: 100%; margin-bottom: 8px; font-size: 14px; }
        button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-right: 6px; margin-bottom: 6px; }
        .btn-primary { background: #0f3460; color: white; }
        .btn-success { background: #e74c3c; color: white; }
        .btn-danger { background: #2ecc71; color: white; }
        .btn-secondary { background: #95a5a6; color: white; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; color: white; }
        .KOSPI { background: #1976D2; }
        .KOSDAQ { background: #388E3C; }
        .ETF { background: #F57C00; }
        .NASDAQ { background: #7B1FA2; }
        .NYSE { background: #C62828; }
        .AMEX, .OTHER { background: #616161; }
        .search-results { border: 1px solid #ddd; max-height: 180px; overflow-y: auto; border-radius: 6px; }
        .search-item { padding: 8px 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
        .search-item:hover { background: #f8f9fa; }
        .price-up { color: #e74c3c; }
        .price-down { color: #2980b9; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #0f3460; color: white; padding: 8px; text-align: left; }
        td { padding: 8px; border-bottom: 1px solid #f0f0f0; }
        tr:hover { background: #f8f9fa; }
        .status { padding: 8px 12px; border-radius: 6px; margin-bottom: 8px; font-size: 13px; }
        .status.success { background: #d4edda; color: #155724; }
        .status.error { background: #f8d7da; color: #721c24; }
        .hidden { display: none; }
        .balance-box { background: linear-gradient(135deg, #0f3460, #16213e); color: white; border-radius: 12px; padding: 20px; }
        .balance-amount { font-size: 28px; font-weight: bold; margin: 8px 0; }
        .tab { display: flex; gap: 8px; margin-bottom: 16px; }
        .tab-btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; background: #ddd; }
        .tab-btn.active { background: #0f3460; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h2>📈 캡스톤 주식 테스트</h2>

    <!-- 로그인/회원가입 -->
    <div class="card" id="authCard">
        <h3>🔐 로그인 / 회원가입</h3>
        <div class="grid">
            <div>
                <h4 style="margin-bottom:8px">로그인</h4>
                <input id="loginEmail" placeholder="이메일" />
                <input id="loginPassword" type="password" placeholder="비밀번호" />
                <button class="btn-primary" onclick="login()">로그인</button>
            </div>
            <div>
                <h4 style="margin-bottom:8px">회원가입</h4>
                <input id="signupName" placeholder="이름" />
                <input id="signupEmail" placeholder="이메일" />
                <input id="signupPassword" type="password" placeholder="비밀번호" />
                <button class="btn-primary" onclick="signup()">회원가입</button>
            </div>
        </div>
        <div id="authStatus"></div>
    </div>

    <!-- 로그인 후 화면 -->
    <div id="mainContent" class="hidden">

        <!-- 사용자 정보 & 잔고 -->
        <div class="grid">
            <div class="balance-box">
                <div>안녕하세요, <span id="userName"></span>님 👋</div>
                <div class="balance-amount">₩<span id="userBalance">0</span></div>
                <div style="font-size:13px;opacity:0.8">가상 잔고</div>
                <button class="btn-secondary" style="margin-top:12px" onclick="logout()">로그아웃</button>
            </div>
            <div class="card" style="margin:0">
                <h3>📊 포트폴리오 요약</h3>
                <div id="portfolioSummary">보유 종목을 불러오는 중...</div>
            </div>
        </div>

        <!-- 종목 검색 & 실시간 주가 -->
        <div class="card">
            <h3>🔍 종목 검색 & 실시간 주가</h3>
            <div class="grid">
                <div>
                    <h4 style="margin-bottom:8px">🇰🇷 국내 주식</h4>
                    <input id="domesticKeyword" placeholder="종목명 검색 (예: 삼성, KODEX)" oninput="searchDomestic()" />
                    <div class="search-results" id="domesticSearchResults"></div>
                    <div id="domesticPriceCard" style="margin-top:8px;padding:12px;background:#f8f9fa;border-radius:8px;">종목을 선택해주세요</div>
                </div>
                <div>
                    <h4 style="margin-bottom:8px">🇺🇸 미국 주식</h4>
                    <input id="overseasKeyword" placeholder="종목명/코드 검색 (예: Apple, AAPL)" oninput="searchOverseas()" />
                    <div class="search-results" id="overseasSearchResults"></div>
                    <div id="overseasPriceCard" style="margin-top:8px;padding:12px;background:#f8f9fa;border-radius:8px;">종목을 선택해주세요</div>
                </div>
            </div>
        </div>

        <!-- 매매 -->
        <div class="card">
            <h3>💰 모의 매매</h3>
            <div class="grid">
                <div>
                    <input id="tradeSymbol" placeholder="종목코드 (예: 005930)" readonly style="background:#f8f9fa" />
                    <input id="tradeName" placeholder="종목명" readonly style="background:#f8f9fa" />
                    <input id="tradeMarket" placeholder="시장" readonly style="background:#f8f9fa" />
                    <input id="tradePrice" placeholder="가격" type="number" />
                    <input id="tradeQuantity" placeholder="수량" type="number" />
                </div>
                <div>
                    <div style="padding:12px;background:#f8f9fa;border-radius:8px;margin-bottom:8px">
                        <div style="font-size:13px;color:#666">예상 금액</div>
                        <div id="tradeTotal" style="font-size:20px;font-weight:bold;color:#0f3460">₩0</div>
                    </div>
                    <button class="btn-success" onclick="trade('BUY')" style="width:100%;margin-bottom:8px;padding:12px;font-size:15px">🔴 매수</button>
                    <button class="btn-danger" onclick="trade('SELL')" style="width:100%;padding:12px;font-size:15px">🟢 매도</button>
                </div>
            </div>
            <div id="tradeStatus"></div>
        </div>

        <!-- 탭: 보유종목 / 주문내역 -->
        <div class="card">
            <div class="tab">
                <button class="tab-btn active" onclick="showTab('holdings')">📦 보유 종목</button>
                <button class="tab-btn" onclick="showTab('orders')">📋 주문 내역</button>
            </div>

            <!-- 보유 종목 -->
            <div id="holdingsTab">
                <button class="btn-primary" onclick="loadHoldings()" style="margin-bottom:12px">새로고침</button>
                <table>
                    <thead>
                    <tr>
                        <th>종목</th>
                        <th>시장</th>
                        <th>보유수량</th>
                        <th>평균단가</th>
                        <th>현재가</th>
                        <th>평가금액</th>
                        <th>수익률</th>
                    </tr>
                    </thead>
                    <tbody id="holdingsTable"><tr><td colspan="7" style="text-align:center">데이터 없음</td></tr></tbody>
                </table>
            </div>

            <!-- 주문 내역 -->
            <div id="ordersTab" class="hidden">
                <button class="btn-primary" onclick="loadOrders()" style="margin-bottom:12px">새로고침</button>
                <table>
                    <thead>
                    <tr>
                        <th>시간</th>
                        <th>종목</th>
                        <th>구분</th>
                        <th>수량</th>
                        <th>가격</th>
                        <th>금액</th>
                    </tr>
                    </thead>
                    <tbody id="ordersTable"><tr><td colspan="6" style="text-align:center">데이터 없음</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const BASE = 'http://localhost:8080';
    const socket = new SockJS(`${BASE}/ws`);
    const stompClient = Stomp.over(socket);
    const subscriptions = {};
    let currentPrices = {};
    let holdingsData = [];

    stompClient.connect({}, () => console.log('WebSocket 연결 성공'));

    function getExchangeCode(market) {
        if (market === 'NASDAQ') return 'NAS';
        if (market === 'NYSE') return 'NYS';
        return 'AMS';
    }

    function formatNumber(n) {
        return Number(n).toLocaleString();
    }

    function showStatus(id, msg, isError = false) {
        const el = document.getElementById(id);
        el.className = `status ${isError ? 'error' : 'success'}`;
        el.textContent = msg;
        setTimeout(() => el.textContent = '', 3000);
    }

    async function signup() {
        const res = await fetch(`${BASE}/api/users/signup`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                name: document.getElementById('signupName').value,
                email: document.getElementById('signupEmail').value,
                password: document.getElementById('signupPassword').value
            })
        });
        const text = await res.text();
        showStatus('authStatus', text, !res.ok);
    }

    async function login() {
        const res = await fetch(`${BASE}/api/users/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify({
                email: document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value
            })
        });
        if (res.ok) {
            await loadMyInfo();
            document.getElementById('authCard').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            loadHoldings();
        } else {
            const text = await res.text();
            showStatus('authStatus', text, true);
        }
    }

    async function logout() {
        await fetch(`${BASE}/api/users/logout`, { method: 'POST', credentials: 'include' });
        document.getElementById('authCard').classList.remove('hidden');
        document.getElementById('mainContent').classList.add('hidden');
    }

    async function loadMyInfo() {
        const res = await fetch(`${BASE}/api/users/me`, { credentials: 'include' });
        const data = await res.json();
        document.getElementById('userName').textContent = data.name;
        document.getElementById('userBalance').textContent = formatNumber(data.balance);
    }

    async function updateBalance() {
        const res = await fetch(`${BASE}/api/trade/balance`, { credentials: 'include' });
        const balance = await res.json();
        document.getElementById('userBalance').textContent = formatNumber(balance);
    }

    function searchDomestic() {
        const keyword = document.getElementById('domesticKeyword').value;
        if (keyword.length < 1) { document.getElementById('domesticSearchResults').innerHTML = ''; return; }
        fetch(`${BASE}/api/stocks/search?keyword=${keyword}`)
            .then(r => r.json())
            .then(data => {
                const filtered = data.filter(s => ['KOSPI','KOSDAQ','ETF'].includes(s.market));
                const div = document.getElementById('domesticSearchResults');
                div.innerHTML = filtered.map(s => `
                    <div class="search-item" onclick="selectDomestic('${s.symbol}','${s.name}','${s.market}')">
                        <span>${s.name} (${s.symbol})</span>
                        <span class="badge ${s.market}">${s.market}</span>
                    </div>`).join('');
            });
    }

    function searchOverseas() {
        const keyword = document.getElementById('overseasKeyword').value;
        if (keyword.length < 1) { document.getElementById('overseasSearchResults').innerHTML = ''; return; }
        fetch(`${BASE}/api/stocks/search?keyword=${keyword}`)
            .then(r => r.json())
            .then(data => {
                const filtered = data.filter(s => ['NASDAQ','NYSE','AMEX','OTHER'].includes(s.market));
                const div = document.getElementById('overseasSearchResults');
                div.innerHTML = filtered.map(s => `
                    <div class="search-item" onclick="selectOverseas('${s.symbol}','${s.name}','${s.market}')">
                        <span>${s.name} (${s.symbol})</span>
                        <span class="badge ${s.market}">${s.market}</span>
                    </div>`).join('');
            });
    }

    function selectDomestic(symbol, name, market) {
        document.getElementById('domesticKeyword').value = name;
        document.getElementById('domesticSearchResults').innerHTML = '';
        setTradeForm(symbol, name, market);

        if (subscriptions['domestic']) subscriptions['domestic'].unsubscribe();
        stompClient.send("/app/subscribe/domestic", {}, symbol);
        subscriptions['domestic'] = stompClient.subscribe(`/topic/domestic/${symbol}`, msg => {
            const data = JSON.parse(msg.body);
            currentPrices[symbol] = parseFloat(data.price);
            const change = parseFloat(data.changePercent);
            const cls = change >= 0 ? 'price-up' : 'price-down';
            document.getElementById('domesticPriceCard').innerHTML = `
                <b>${name} (${symbol})</b> <span class="badge ${market}">${market}</span><br>
                <span style="font-size:20px;font-weight:bold" class="${cls}">₩${formatNumber(data.price)}</span>
                <span class="${cls}" style="font-size:13px"> ${change >= 0 ? '▲' : '▼'} ${data.change} (${data.changePercent}%)</span>
            `;
            document.getElementById('tradePrice').value = data.price;
            updateTradeTotal();
            updateHoldingsTable(holdingsData);
        });
    }

    function selectOverseas(symbol, name, market) {
        document.getElementById('overseasKeyword').value = name;
        document.getElementById('overseasSearchResults').innerHTML = '';
        setTradeForm(symbol, name, market);

        if (subscriptions['overseas']) subscriptions['overseas'].unsubscribe();
        const exchange = getExchangeCode(market);
        stompClient.send("/app/subscribe/overseas", {}, `${symbol},${exchange}`);
        subscriptions['overseas'] = stompClient.subscribe(`/topic/overseas/${symbol}`, msg => {
            const data = JSON.parse(msg.body);
            currentPrices[symbol] = parseFloat(data.price);
            const change = parseFloat(data.changePercent);
            const cls = change >= 0 ? 'price-up' : 'price-down';
            document.getElementById('overseasPriceCard').innerHTML = `
                <b>${name} (${symbol})</b> <span class="badge ${market}">${market}</span><br>
                <span style="font-size:20px;font-weight:bold" class="${cls}">$${data.price}</span>
                <span class="${cls}" style="font-size:13px"> ${change >= 0 ? '▲' : '▼'} ${data.change} (${data.changePercent}%)</span>
            `;
            document.getElementById('tradePrice').value = data.price;
            updateTradeTotal();
            updateHoldingsTable(holdingsData);
        });
    }

    function setTradeForm(symbol, name, market) {
        document.getElementById('tradeSymbol').value = symbol;
        document.getElementById('tradeName').value = name;
        document.getElementById('tradeMarket').value = market;
    }

    function updateTradeTotal() {
        const price = parseFloat(document.getElementById('tradePrice').value) || 0;
        const qty = parseInt(document.getElementById('tradeQuantity').value) || 0;
        document.getElementById('tradeTotal').textContent = '₩' + formatNumber(price * qty);
    }
    document.getElementById('tradePrice')?.addEventListener('input', updateTradeTotal);
    document.getElementById('tradeQuantity')?.addEventListener('input', updateTradeTotal);

    async function trade(type) {
        const dto = {
            symbol: document.getElementById('tradeSymbol').value,
            name: document.getElementById('tradeName').value,
            market: document.getElementById('tradeMarket').value,
            type: type,
            quantity: parseInt(document.getElementById('tradeQuantity').value),
            price: parseFloat(document.getElementById('tradePrice').value)
        };
        if (!dto.symbol || !dto.quantity || !dto.price) {
            showStatus('tradeStatus', '종목과 수량, 가격을 입력해주세요.', true);
            return;
        }
        const res = await fetch(`${BASE}/api/trade/${type === 'BUY' ? 'buy' : 'sell'}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'include',
            body: JSON.stringify(dto)
        });
        const text = await res.text();
        showStatus('tradeStatus', text, !res.ok);
        if (res.ok) {
            updateBalance();
            loadHoldings();
        }
    }

    async function loadHoldings() {
        const res = await fetch(`${BASE}/api/trade/holdings`, { credentials: 'include' });
        const data = await res.json();
        holdingsData = data;
        const tbody = document.getElementById('holdingsTable');

        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="7" style="text-align:center">보유 종목 없음</td></tr>';
            document.getElementById('portfolioSummary').innerHTML = '보유 종목 없음';
            return;
        }

        // 보유 종목 자동 구독
        data.forEach(h => {
            if (!subscriptions[h.symbol]) {
                if (h.market === 'KOSPI' || h.market === 'KOSDAQ' || h.market === 'ETF') {
                    stompClient.send("/app/subscribe/domestic", {}, h.symbol);
                    subscriptions[h.symbol] = stompClient.subscribe(`/topic/domestic/${h.symbol}`, msg => {
                        const d = JSON.parse(msg.body);
                        currentPrices[h.symbol] = parseFloat(d.price);
                        updateHoldingsTable(holdingsData);
                    });
                } else {
                    const exchange = getExchangeCode(h.market);
                    stompClient.send("/app/subscribe/overseas", {}, `${h.symbol},${exchange}`);
                    subscriptions[h.symbol] = stompClient.subscribe(`/topic/overseas/${h.symbol}`, msg => {
                        const d = JSON.parse(msg.body);
                        currentPrices[h.symbol] = parseFloat(d.price);
                        updateHoldingsTable(holdingsData);
                    });
                }
            }
        });

        updateHoldingsTable(data);
    }

    function updateHoldingsTable(data) {
        if (!data.length) return;
        const tbody = document.getElementById('holdingsTable');
        let totalBuy = 0, totalEval = 0;
        tbody.innerHTML = data.map(h => {
            const currentPrice = currentPrices[h.symbol] || h.avgPrice;
            const evalAmount = currentPrice * h.quantity;
            const buyAmount = h.avgPrice * h.quantity;
            const profit = evalAmount - buyAmount;
            const profitRate = ((profit / buyAmount) * 100).toFixed(2);
            totalBuy += buyAmount;
            totalEval += evalAmount;
            const cls = profit >= 0 ? 'price-up' : 'price-down';
            return `<tr>
                <td><b>${h.name}</b> (${h.symbol})</td>
                <td><span class="badge ${h.market}">${h.market}</span></td>
                <td>${h.quantity}주</td>
                <td>₩${formatNumber(h.avgPrice)}</td>
                <td>₩${formatNumber(currentPrice)}</td>
                <td>₩${formatNumber(Math.round(evalAmount))}</td>
                <td class="${cls}">${profit >= 0 ? '+' : ''}${profitRate}%</td>
            </tr>`;
        }).join('');

        const totalProfit = totalEval - totalBuy;
        const totalRate = ((totalProfit / totalBuy) * 100).toFixed(2);
        const cls = totalProfit >= 0 ? 'price-up' : 'price-down';
        document.getElementById('portfolioSummary').innerHTML = `
            <div style="margin-bottom:6px">총 매수금액: <b>₩${formatNumber(Math.round(totalBuy))}</b></div>
            <div style="margin-bottom:6px">총 평가금액: <b>₩${formatNumber(Math.round(totalEval))}</b></div>
            <div class="${cls}" style="font-size:18px;font-weight:bold">
                ${totalProfit >= 0 ? '+' : ''}₩${formatNumber(Math.round(totalProfit))} (${totalRate}%)
            </div>
        `;
    }

    async function loadOrders() {
        const res = await fetch(`${BASE}/api/trade/orders`, { credentials: 'include' });
        const data = await res.json();
        const tbody = document.getElementById('ordersTable');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">주문 내역 없음</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(o => {
            const time = new Date(o.createdAt).toLocaleString('ko-KR');
            const cls = o.type === 'BUY' ? 'price-up' : 'price-down';
            return `<tr>
                <td style="font-size:12px">${time}</td>
                <td><b>${o.name}</b> (${o.symbol})</td>
                <td class="${cls}"><b>${o.type === 'BUY' ? '매수' : '매도'}</b></td>
                <td>${o.quantity}주</td>
                <td>₩${formatNumber(o.price)}</td>
                <td>₩${formatNumber(o.price * o.quantity)}</td>
            </tr>`;
        }).join('');
    }

    function showTab(tab) {
        document.getElementById('holdingsTab').classList.toggle('hidden', tab !== 'holdings');
        document.getElementById('ordersTab').classList.toggle('hidden', tab !== 'orders');
        document.querySelectorAll('.tab-btn').forEach((btn, i) => {
            btn.classList.toggle('active', (i === 0 && tab === 'holdings') || (i === 1 && tab === 'orders'));
        });
        if (tab === 'orders') loadOrders();
    }
</script>
</body>
</html>
