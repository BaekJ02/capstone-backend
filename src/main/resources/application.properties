spring.application.name=capstone

kis.api.url=https://openapi.koreainvestment.com:9443

spring.config.import=application-secret.properties

# H2 ??
spring.datasource.url=jdbc:h2:file:./data/capstone
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true

kis.ws.url=ws://ops.koreainvestment.com:21000